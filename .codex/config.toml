# 项目级 Codex 配置（/home/ub/cx_ws）
# 注意：openai_base_url / model_provider 只能在 ~/.codex/config.toml 设置


# =====================================================================
# 基础服务商映射
# =====================================================================
provider = "openai"
base_url = "https://api.yeelo.fun/v1"  # 第三方代理中转地址
model = "gpt-5.4"              # 对应你所使用的自定义代理模型

# =====================================================================
# 沙箱策略优化：工作区完全放权 + 允许联网
# =====================================================================
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true         # 🔥 允许沙箱内联网（如跑 npm install、curl 等）
exclude_slash_tmp = false     # 允许完全控制 Linux /tmp 目录
exclude_tmpdir_env_var = true # 环境依赖识别到真实的 TMPDIR

# =====================================================================
# 容错控制：第三方 WebSocket 频繁断线
# =====================================================================
[timeout]
api_timeout_ms = 60000        # 提高超时到 60 秒，减少假死伪断线误判

[retry]
max_retries = 5               # 遭遇断线时，允许最多稳步重试 5 次
retry_delay_ms = 3000         # ⚠️ 每次重试间隔拉长至 3~5 秒，给服务器缓冲时间
